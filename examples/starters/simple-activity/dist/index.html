<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lantern Activity</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --line: #d9cebf;
        --text: #213038;
        --muted: #5f6d75;
        --accent: #285f56;
        --accent-soft: #ddece6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top right, #e9e0d1, transparent 30%),
          linear-gradient(180deg, #f8f5ee 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }

      .panel {
        display: grid;
        gap: 20px;
        padding: 24px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 18px 42px rgba(33, 48, 56, 0.08);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.92rem;
      }

      .question {
        display: grid;
        gap: 10px;
        padding: 18px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .label {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
      }

      .button-primary {
        background: var(--accent);
        color: #f7f3ea;
      }

      .button-secondary {
        background: #ebe3d4;
        color: var(--text);
      }

      .ledger {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      .fact {
        padding: 14px;
        border-radius: 14px;
        background: #fbf8f2;
        border: 1px solid var(--line);
      }

      .fact-label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .fact-value {
        font-size: 1.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div>
          <p class="eyebrow">Lantern Starter</p>
          <h1 data-test="app-title">Loading activity...</h1>
          <p id="instructions">Loading instructions...</p>
        </div>

        <div class="meta">
          <span class="chip" id="launch-chip" data-test="launch-chip"
          >Loading launch...</span>
          <span class="chip" id="status-chip" data-test="status-chip"
          >Waiting for runtime...</span>
        </div>

        <section class="question">
          <span class="label">Prompt</span>
          <strong id="prompt" data-test="question-prompt"
          >Loading prompt...</strong>
        </section>

        <div class="button-row">
          <button
            type="button"
            class="button-primary"
            id="progress-button"
            data-test="progress-button"
          >
            Mark Step Done
          </button>
          <button
            type="button"
            class="button-secondary"
            id="complete-button"
            data-test="complete-button"
          >
            Finish Attempt
          </button>
        </div>

        <section class="ledger">
          <article class="fact">
            <span class="fact-label">Progress Events</span>
            <strong
              class="fact-value"
              id="progress-count"
              data-test="progress-count"
            >0</strong>
          </article>
          <article class="fact">
            <span class="fact-label">Last Finalize</span>
            <strong
              class="fact-value"
              id="finalize-state"
              data-test="finalize-state"
            >
              Not finished
            </strong>
          </article>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
