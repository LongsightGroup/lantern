<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Template App</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e7;
        --panel: #fffdfa;
        --line: #d7ccbc;
        --text: #1f2a30;
        --muted: #5e6b72;
        --accent: #2c6b5a;
        --accent-soft: #dcebe5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top right, #ece4d5, transparent 32%),
          linear-gradient(180deg, #f7f3ea 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 18px 40px rgba(31, 42, 48, 0.08);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.1rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.92rem;
      }

      .question {
        padding: 18px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
      }

      .button-primary {
        background: var(--accent);
        color: #f7f3ea;
      }

      .button-secondary {
        background: #ebe3d4;
        color: var(--text);
      }

      .ledger {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      .fact {
        padding: 14px;
        border-radius: 14px;
        background: #fbf8f2;
        border: 1px solid var(--line);
      }

      .fact-label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .fact-value {
        font-size: 1.4rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel stack">
        <div class="stack">
          <p class="eyebrow">Lantern Template</p>
          <h1 data-test="app-title">Template App</h1>
          <p id="instructions">
            This app demonstrates the smallest governed Lantern browser path.
          </p>
        </div>

        <div class="meta">
          <span class="chip" id="launch-chip" data-test="launch-chip">Loading launch...</span>
          <span class="chip" id="status-chip" data-test="status-chip">Waiting for runtime...</span>
        </div>

        <section class="question stack">
          <p class="fact-label">Prompt</p>
          <strong id="prompt" data-test="question-prompt">Loading content...</strong>
          <p id="hint" data-test="hint-copy"></p>
        </section>

        <div class="button-row">
          <button type="button" class="button-primary" id="answer-button" data-test="answer-button">
            Mark Answered
          </button>
          <button type="button" class="button-secondary" id="complete-button" data-test="complete-button">
            Finish Attempt
          </button>
        </div>

        <section class="ledger">
          <article class="fact">
            <span class="fact-label">Answers Sent</span>
            <strong class="fact-value" id="answer-count" data-test="answer-count">0</strong>
          </article>
          <article class="fact">
            <span class="fact-label">Last Finalize</span>
            <strong class="fact-value" id="finalize-state" data-test="finalize-state">Not finished</strong>
          </article>
        </section>
      </section>
    </main>

    <script src="/dist/app.js"></script>
  </body>
</html>
