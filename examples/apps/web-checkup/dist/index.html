<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web Checkup</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe6;
        --panel: #fffdf8;
        --line: #d8cec0;
        --ink: #1f2a30;
        --muted: #5f6d73;
        --accent: #255f63;
        --accent-soft: #deecec;
        --warm: #f0e0c6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Source Serif 4", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #faf4ea, transparent 34%),
          linear-gradient(180deg, #f9f6ef 0%, var(--bg) 100%);
      }

      main {
        width: min(1040px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(31, 42, 48, 0.08);
      }

      .hero {
        padding: 24px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 4rem);
        line-height: 0.94;
      }

      p {
        margin: 0;
        line-height: 1.55;
        color: var(--muted);
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.94rem;
      }

      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.7fr);
      }

      .checklist {
        padding: 22px;
      }

      .group {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        padding: 18px;
      }

      .group h2 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }

      ul {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 10px;
      }

      .rail {
        padding: 22px;
      }

      .fact {
        border-radius: 18px;
        padding: 16px;
        background: #fcf8f1;
        border: 1px solid var(--line);
      }

      .fact-label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .fact-value {
        font-size: 1.5rem;
        color: var(--ink);
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
      }

      .button-primary {
        background: var(--accent);
        color: #f8f4ec;
      }

      .button-secondary {
        background: var(--warm);
        color: var(--ink);
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="stack">
      <section class="panel hero stack">
        <div class="stack">
          <p class="eyebrow">Lantern Web Checkup</p>
          <h1 data-test="app-title">Web Checkup</h1>
          <p id="instructions">
            Review the revised page checklist and capture what still needs attention.
          </p>
          <p id="scenario" data-test="scenario-copy">
            Loading review scenario...
          </p>
        </div>
        <div class="hero-meta">
          <span class="chip" id="launch-chip" data-test="launch-chip">Loading launch...</span>
          <span class="chip" id="status-chip" data-test="status-chip">Waiting for runtime...</span>
        </div>
      </section>

      <section class="grid">
        <article class="panel checklist stack">
          <section class="group stack">
            <h2>HTML Review</h2>
            <ul id="html-checks" data-test="html-checks"></ul>
          </section>
          <section class="group stack">
            <h2>CSS Review</h2>
            <ul id="css-checks" data-test="css-checks"></ul>
          </section>
          <section class="group stack">
            <h2>JavaScript Review</h2>
            <ul id="js-checks" data-test="js-checks"></ul>
          </section>
        </article>

        <aside class="panel rail stack">
          <article class="fact">
            <span class="fact-label">Sections Reviewed</span>
            <strong class="fact-value" id="reviewed-count" data-test="reviewed-count">0</strong>
          </article>
          <article class="fact">
            <span class="fact-label">Finalize Status</span>
            <strong class="fact-value" id="finalize-state" data-test="finalize-state">Not finished</strong>
          </article>
          <div class="button-row">
            <button type="button" class="button-secondary" id="review-button" data-test="review-button">
              Mark Section Reviewed
            </button>
            <button type="button" class="button-primary" id="complete-button" data-test="complete-button">
              Finish Review
            </button>
          </div>
        </aside>
      </section>
    </main>

    <script src="/dist/app.js"></script>
  </body>
</html>
