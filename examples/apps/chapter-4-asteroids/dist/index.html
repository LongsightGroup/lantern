<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chapter 4 Asteroids</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --surface: #ffffff;
        --text: #18354a;
        --muted: #5f7484;
        --accent: #1d7ed6;
        --border: #d8e1e8;
        --good: #0d8a56;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font:
          16px/1.5 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .shell {
        max-width: 760px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(24, 53, 74, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
        line-height: 1.2;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-top: 16px;
        background: #fcfdfe;
      }

      .choices {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        background: white;
        color: var(--text);
        text-align: left;
        cursor: pointer;
        font: inherit;
      }

      button:hover {
        border-color: var(--accent);
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        gap: 12px;
      }

      .status {
        color: var(--good);
        font-weight: 600;
      }

      .complete {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1 data-test="app-title">Chapter 4 Asteroids</h1>
      <p id="instructions"></p>

      <section class="card">
        <strong data-test="question-prompt" id="prompt"></strong>
        <div class="choices" id="choices"></div>
      </section>

      <div class="footer">
        <span class="status" id="status">Preview mode</span>
        <button class="complete" data-test="complete-button" id="complete">Finish activity</button>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
